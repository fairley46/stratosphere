{{- range .Values.components }}
{{- if gt (len .ports) 0 }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .id }}
  labels:
    app: {{ .id }}
spec:
  selector:
    app: {{ .id }}
  ports:
  - name: http
    port: {{ index .ports 0 }}
    targetPort: {{ index .ports 0 }}
---
{{- end }}
{{- end }}
